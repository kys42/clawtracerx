<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ClawTracerX{% endblock %} — OpenClaw Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/i18n.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </div>
      <span class="brand-text">ClawTracerX</span>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="ko" onclick="setLang('ko')">🇰🇷 KO</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇺🇸 EN</button>
    </div>
    <ul class="sidebar-nav">
      <li><a href="/home" class="nav-link {% if active == 'home' %}active{% endif %}">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav.home">Home</span>
      </a></li>
      <li><a href="/" class="nav-link {% if active == 'sessions' %}active{% endif %}">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav.sessions">Sessions</span>
      </a></li>
      <li><a href="/cost" class="nav-link {% if active == 'cost' %}active{% endif %}">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav.cost">Cost</span>
      </a></li>
      <li><a href="/schedule" class="nav-link {% if active == 'schedule' %}active{% endif %}">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav.schedule">Schedule</span>
      </a></li>
      <li><a class="nav-link nav-link-disabled" title="Coming soon" style="opacity:0.4;cursor:not-allowed;pointer-events:none;">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3h6v7l4 9H5l4-9V3z"/>
            <line x1="9" y1="3" x2="15" y2="3"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav.lab">Lab</span>
        <span style="font-size:0.65rem;margin-left:4px;opacity:0.7;">soon</span>
      </a></li>
      <li><a href="/settings" class="nav-link {% if active == 'settings' %}active{% endif %}">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="nav.settings">Settings</span>
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sidebar-health" id="sidebar-health"></div>
      <div class="sidebar-info" id="agent-list"></div>
    </div>
  </nav>

  <main class="content">
    <div id="update-banner" class="update-banner" style="display:none">
      <span data-i18n="update.available">New version available:</span>
      <strong class="update-version"></strong>
      <a class="update-link" target="_blank" data-i18n="update.view">View Release</a>
      <button class="update-dismiss" onclick="dismissUpdate()">&times;</button>
    </div>
    {% block content %}{% endblock %}
  </main>

  <!-- 공통 텍스트 전문 보기 modal -->
  <div id="text-modal" class="modal" onclick="if(event.target===this)closeTextModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="text-modal-title"></h3>
        <div class="modal-toolbar">
          <button id="text-modal-copy" class="modal-tool-btn" onclick="copyModalText()">Copy</button>
          <button id="text-modal-toggle" class="modal-tool-btn" onclick="toggleModalMarkdown()">Raw</button>
          <button class="btn-close" onclick="closeTextModal()">&times;</button>
        </div>
      </div>
      <div id="text-modal-md" class="md-body modal-scroll" style="display:none"></div>
      <pre id="text-modal-pre" class="raw-json modal-scroll"></pre>
    </div>
  </div>

  <script>window._homeDir = "{{ home_dir }}";</script>
  <script src="/static/app.js"></script>
  <script>
  fetch('/api/health').then(function(r){return r.json()}).then(function(h){
    var el=document.getElementById('sidebar-health');
    if(!el)return;
    var c=h.checks;
    function dot(ok){return '<span class="health-dot '+(ok?'ok':'err')+'"></span>'}
    el.innerHTML=
      '<div class="health-row">'+dot(c.config&&c.config.ok)+' '+_t('health.config')+'</div>'+
      '<div class="health-row">'+dot(c.gateway&&c.gateway.ok)+' '+_t('health.gateway')+'</div>'+
      '<div class="health-row">'+dot(c.agents&&c.agents.ok)+' '+_t('health.agents')+(c.agents&&c.agents.ok?' ('+c.agents.agents+')':'')+'</div>'+
      '<div class="health-row">'+dot(c.device&&c.device.ok)+' '+_t('health.device')+'</div>';
  }).catch(function(){});
  document.addEventListener('langchange', function() {
    fetch('/api/health').then(function(r){return r.json()}).then(function(h){
      var el=document.getElementById('sidebar-health');
      if(!el)return;
      var c=h.checks;
      function dot(ok){return '<span class="health-dot '+(ok?'ok':'err')+'"></span>'}
      el.innerHTML=
        '<div class="health-row">'+dot(c.config&&c.config.ok)+' '+_t('health.config')+'</div>'+
        '<div class="health-row">'+dot(c.gateway&&c.gateway.ok)+' '+_t('health.gateway')+'</div>'+
        '<div class="health-row">'+dot(c.agents&&c.agents.ok)+' '+_t('health.agents')+(c.agents&&c.agents.ok?' ('+c.agents.agents+')':'')+'</div>'+
        '<div class="health-row">'+dot(c.device&&c.device.ok)+' '+_t('health.device')+'</div>';
    }).catch(function(){});
  });
  checkForUpdate();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
