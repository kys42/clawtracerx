{% extends "base.html" %}
{% set active = "cost" %}
{% block title %}Cost Dashboard{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Cost Dashboard</h1>
  <div class="filters">
    <select id="filter-period" class="input-select" onchange="loadCost()">
      <option value="today">Today</option>
      <option value="week" selected>This Week</option>
      <option value="month">This Month</option>
      <option value="all">All Time</option>
    </select>
    <select id="filter-agent" class="input-select" onchange="loadCost()">
      <option value="all">All Agents</option>
    </select>
  </div>
</div>

<div class="cost-summary" id="cost-summary">
  <div class="summary-card hero skeleton" style="height:112px"></div>
  <div class="summary-card skeleton" style="height:112px"></div>
  <div class="summary-card skeleton" style="height:112px"></div>
</div>

<div class="cost-grid">
  <div class="card">
    <h3>Cost by Agent</h3>
    <div id="chart-agent"></div>
  </div>
  <div class="card">
    <h3>Cost by Type</h3>
    <div id="chart-type"></div>
  </div>
  <div class="card">
    <h3>Cost by Model</h3>
    <div id="chart-model"></div>
  </div>
  <div class="card">
    <h3>Agent × Type</h3>
    <div id="agent-type-table"><div class="empty">Loading...</div></div>
  </div>
  <div class="card full-width">
    <h3>Daily Cost</h3>
    <div id="chart-daily"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const charts = {};

const APEX_BASE = {
  theme: { mode: 'dark' },
  chart: {
    background: 'transparent',
    foreColor: '#b0b4c0',
    fontFamily: "'JetBrains Mono', 'Inter', monospace",
    toolbar: { show: false },
    animations: { enabled: true, speed: 450, animateGradually: { enabled: true, delay: 80 } },
  },
  grid: { borderColor: 'rgba(255,255,255,0.06)', strokeDashArray: 4 },
  tooltip: { theme: 'dark' },
};

function destroyChart(id) {
  if (charts[id]) {
    try { charts[id].destroy(); } catch(e) {}
    delete charts[id];
  }
}

function renderApexBar(containerId, dataMap) {
  const el = qs(`#${containerId}`);
  destroyChart(containerId);
  if (!dataMap || !Object.keys(dataMap).length) {
    el.innerHTML = '<div class="empty">No data</div>';
    return;
  }
  el.innerHTML = '';
  const entries = Object.entries(dataMap).sort((a, b) => b[1] - a[1]);
  const categories = entries.map(([l]) => l);
  const values = entries.map(([, v]) => parseFloat(v.toFixed(6)));

  charts[containerId] = new ApexCharts(el, {
    ...APEX_BASE,
    series: [{ name: 'Cost ($)', data: values }],
    chart: {
      ...APEX_BASE.chart,
      type: 'bar',
      height: Math.max(160, categories.length * 38 + 48),
    },
    plotOptions: {
      bar: {
        horizontal: true,
        borderRadius: 5,
        barHeight: '60%',
        dataLabels: { position: 'right' },
      },
    },
    dataLabels: {
      enabled: true,
      formatter: v => fmtCost(v),
      style: { fontSize: '11px', colors: ['#b0b4c0'], fontFamily: "'JetBrains Mono', monospace" },
      offsetX: 6,
    },
    xaxis: {
      categories,
      labels: {
        formatter: v => fmtCost(v),
        style: { colors: '#6b7280', fontSize: '11px', fontFamily: "'JetBrains Mono', monospace" },
      },
      axisBorder: { color: 'rgba(255,255,255,0.06)' },
      axisTicks: { color: 'rgba(255,255,255,0.06)' },
    },
    yaxis: {
      labels: { style: { colors: '#b0b4c0', fontSize: '12px' } },
    },
    fill: {
      type: 'gradient',
      gradient: {
        shade: 'dark', type: 'horizontal',
        gradientToColors: ['#06b6d4'], stops: [0, 100],
        shadeIntensity: 0.4,
      },
    },
    colors: ['#6366f1'],
    tooltip: { ...APEX_BASE.tooltip, y: { formatter: v => fmtCost(v) } },
  });
  charts[containerId].render();
}

function renderApexArea(containerId, dataMap) {
  const el = qs(`#${containerId}`);
  destroyChart(containerId);
  if (!dataMap || !Object.keys(dataMap).length) {
    el.innerHTML = '<div class="empty">No data</div>';
    return;
  }
  el.innerHTML = '';
  const entries = Object.entries(dataMap).sort((a, b) => a[0].localeCompare(b[0]));
  const categories = entries.map(([d]) => d);
  const values = entries.map(([, v]) => parseFloat(v.toFixed(6)));

  charts[containerId] = new ApexCharts(el, {
    ...APEX_BASE,
    series: [{ name: 'Cost ($)', data: values }],
    chart: {
      ...APEX_BASE.chart,
      type: 'area',
      height: 280,
      toolbar: {
        show: true,
        tools: { zoom: true, reset: true, pan: true, download: false, selection: false, zoomin: false, zoomout: false },
      },
      zoom: { enabled: true },
    },
    stroke: { curve: 'smooth', width: 2, colors: ['#6366f1'] },
    fill: {
      type: 'gradient',
      gradient: {
        shade: 'dark', type: 'vertical',
        shadeIntensity: 0.5,
        gradientToColors: ['#09090b'],
        opacityFrom: 0.45, opacityTo: 0.02,
        stops: [0, 100],
      },
      colors: ['#6366f1'],
    },
    xaxis: {
      categories,
      labels: {
        style: { colors: '#6b7280', fontSize: '11px', fontFamily: "'JetBrains Mono', monospace" },
        rotate: -45,
      },
      axisBorder: { color: 'rgba(255,255,255,0.06)' },
      axisTicks: { color: 'rgba(255,255,255,0.06)' },
    },
    yaxis: {
      labels: {
        formatter: v => fmtCost(v),
        style: { colors: '#6b7280', fontSize: '11px', fontFamily: "'JetBrains Mono', monospace" },
      },
    },
    markers: { size: 4, colors: ['#6366f1'], strokeColors: '#818cf8', strokeWidth: 2, hover: { size: 6 } },
    tooltip: {
      ...APEX_BASE.tooltip,
      x: { show: true },
      y: { formatter: v => fmtCost(v) },
      crosshairs: { stroke: { color: '#6366f1', width: 1, dashArray: 3 } },
    },
    dataLabels: { enabled: false },
  });
  charts[containerId].render();
}

async function loadCost() {
  const period = qs('#filter-period').value;
  const agent = qs('#filter-agent').value;
  const data = await fetchJSON(`/api/cost?period=${period}&agent=${agent}`);

  // Hero metric cards
  qs('#cost-summary').innerHTML = `
    <div class="summary-card hero">
      <div class="summary-value cost">${fmtCost(data.total_cost)}</div>
      <div class="summary-label">Total Cost</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${fmtTokens(data.total_tokens)}</div>
      <div class="summary-label">Total Tokens</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${data.session_count}</div>
      <div class="summary-label">Sessions</div>
    </div>
  `;

  renderApexBar('chart-agent', data.by_agent);
  renderApexBar('chart-type', data.by_type);
  renderApexBar('chart-model', data.by_model);
  renderAgentTypeTable('agent-type-table', data.by_agent_type, data.by_type);
  renderApexArea('chart-daily', data.by_day);
}

function renderAgentTypeTable(containerId, byAgentType, byType) {
  const el = qs(`#${containerId}`);
  if (!byAgentType || !Object.keys(byAgentType).length) {
    el.innerHTML = '<div class="empty">No data</div>';
    return;
  }

  // 실제로 존재하는 타입만 컬럼으로
  const allTypes = ['chat', 'cron', 'heartbeat', 'subagent'];
  const activeTypes = allTypes.filter(t =>
    Object.values(byAgentType).some(row => row[t] > 0)
  );

  const typeLabels = { chat: '💬 Chat', cron: '⏰ Cron', heartbeat: '💗 HB', subagent: '🤖 Sub' };
  const typeColors = { chat: '#60a5fa', cron: '#fbbf24', heartbeat: '#f472b6', subagent: '#a78bfa' };

  const agents = Object.keys(byAgentType);
  const colTotal = (t) => agents.reduce((s, a) => s + (byAgentType[a][t] || 0), 0);
  const rowTotal = (a) => activeTypes.reduce((s, t) => s + (byAgentType[a][t] || 0), 0);
  const grandTotal = agents.reduce((s, a) => s + rowTotal(a), 0);

  const fmtCell = (v) => v > 0 ? `<span style="color:var(--text-0);font-weight:500">${fmtCost(v)}</span>` : `<span style="color:var(--text-3)">—</span>`;

  el.innerHTML = `
    <div class="cost-breakdown-wrap">
      <table class="cost-breakdown-table">
        <thead>
          <tr>
            <th>Agent</th>
            ${activeTypes.map(t => `<th style="color:${typeColors[t]}">${typeLabels[t]}</th>`).join('')}
            <th style="color:var(--text-1)">Total</th>
          </tr>
        </thead>
        <tbody>
          ${agents.map(a => `
            <tr>
              <td class="cbt-agent">${a}</td>
              ${activeTypes.map(t => `<td class="cbt-val">${fmtCell(byAgentType[a][t] || 0)}</td>`).join('')}
              <td class="cbt-total">${fmtCost(rowTotal(a))}</td>
            </tr>
          `).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td class="cbt-agent" style="color:var(--text-3);font-style:italic">Total</td>
            ${activeTypes.map(t => `<td class="cbt-val">${fmtCell(colTotal(t))}</td>`).join('')}
            <td class="cbt-total" style="color:var(--success)">${fmtCost(grandTotal)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

async function loadAgents() {
  const agents = await fetchJSON('/api/agents');
  const sel = qs('#filter-agent');
  agents.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = a.id;
    sel.appendChild(opt);
  });
}

loadAgents();
loadCost();
</script>
{% endblock %}
