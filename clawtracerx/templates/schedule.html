{% extends "base.html" %}
{% set active = "schedule" %}
{% block title %}Schedule{% endblock %}

{% block content %}
<div x-data="schedulePage()" x-init="load(); startAutoRefresh()" @langchange.window="load()">

<div class="page-header">
  <h1 data-i18n="schedule.title">Schedule</h1>
  <div class="filters" style="display:flex;align-items:center;gap:8px">
    <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-2);cursor:pointer">
      <input type="checkbox" x-model="autoRefreshOn" @change="toggleAutoRefresh()">
      <span x-text="_t('schedule.auto_refresh')"></span>
      <span x-show="autoRefreshOn && countdown > 0" x-text="'(' + countdown + 's)'" style="color:var(--text-3);font-size:11px"></span>
    </label>
    <button class="btn btn-sm" @click="load()" data-i18n="schedule.refresh">Refresh</button>
  </div>
</div>

<div x-show="loading" class="loading-bar"></div>

<div class="sched-summary" id="sched-summary">
  <template x-if="!loaded">
    <template x-for="i in 4">
      <div class="summary-card skeleton" style="height:100px"></div>
    </template>
  </template>
</div>

<section id="hb-section">
  <h2 class="section-title" data-i18n="schedule.heartbeat">Heartbeat</h2>
  <div id="heartbeats" class="hb-grid"></div>
</section>

<section id="cron-section" style="margin-top:32px">
  <h2 class="section-title" data-i18n="schedule.cron_jobs">Cron Jobs</h2>
  <div id="cron-jobs" class="cron-cards">
    <template x-if="!loaded">
      <div>
        <div class="skeleton" style="height:60px;border-radius:var(--radius);margin-bottom:8px"></div>
        <div class="skeleton" style="height:60px;border-radius:var(--radius);margin-bottom:8px"></div>
      </div>
    </template>
  </div>
</section>

</div>
{% endblock %}

{% block scripts %}
<script>
function fmtMs(ms) {
  if (!ms) return '\u2014';
  return fmtDate(new Date(ms).toISOString());
}

function fmtRelMs(ms) {
  if (!ms) return '\u2014';
  const now = Date.now();
  const diff = ms - now;
  const absDiff = Math.abs(diff);
  const suffix = diff >= 0 ? _t('time.future') : _t('time.past');
  if (absDiff < 60000) return Math.round(absDiff / 1000) + _t('time.seconds') + suffix;
  if (absDiff < 3600000) return Math.round(absDiff / 60000) + _t('time.minutes') + suffix;
  if (absDiff < 86400000) {
    const h = Math.floor(absDiff / 3600000);
    const m = Math.round((absDiff % 3600000) / 60000);
    return h + _t('time.hours') + ' ' + m + _t('time.minutes') + suffix;
  }
  return Math.round(absDiff / 86400000) + _t('time.days') + suffix;
}

function statusDotHtml(status, enabled) {
  if (!enabled) return '<span class="status-dot disabled"></span>';
  if (status === 'ok') return '<span class="status-dot ok"></span>';
  if (status === 'error') return '<span class="status-dot error"></span>';
  return '<span class="status-dot disabled"></span>';
}

function renderActiveHoursBar(activeHours) {
  if (!activeHours) return '';
  let activeSet = new Set();
  if (Array.isArray(activeHours)) {
    activeHours.forEach(function(h) { activeSet.add(h); });
  } else if (activeHours.start !== undefined && activeHours.end !== undefined) {
    const s = activeHours.start, e = activeHours.end;
    if (s <= e) {
      for (let i = s; i < e; i++) activeSet.add(i);
    } else {
      for (let i = s; i < 24; i++) activeSet.add(i);
      for (let i = 0; i < e; i++) activeSet.add(i);
    }
  } else {
    return '';
  }
  let html = '<div class="hb-hours-bar" x-data="{ hoveredHour: null }">';
  for (let h = 0; h < 24; h++) {
    html += '<div class="hb-hour-seg' + (activeSet.has(h) ? ' active' : '') + '"'
      + ' @mouseenter="hoveredHour = ' + h + '" @mouseleave="hoveredHour = null">'
      + '<span class="hb-hour-tooltip" x-show="hoveredHour === ' + h + '" x-transition.duration.150ms>' + h + ':00</span>'
      + '</div>';
  }
  html += '</div>';
  html += '<div class="hb-hours-label"><span>0</span><span>6</span><span>12</span><span>18</span><span>24</span></div>';
  return html;
}

function renderSummary(summary, jobs) {
  const el = document.getElementById('sched-summary');
  let nearestNext = null;
  for (const j of jobs) {
    if (j.enabled && j.next_run_at_ms) {
      if (!nearestNext || j.next_run_at_ms < nearestNext) nearestNext = j.next_run_at_ms;
    }
  }

  const nextRunHtml = nearestNext
    ? '<span x-data="schedCountdown(' + nearestNext + ')" x-text="display"></span>'
    : '\u2014';

  el.innerHTML =
    '<div class="summary-card">' +
      '<div class="summary-label">' + _t('schedule.enabled') + '</div>' +
      '<div class="summary-value">' + summary.enabled + '<span class="summary-sub"> / ' + summary.total + '</span></div>' +
    '</div>' +
    '<div class="summary-card">' +
      '<div class="summary-label">' + _t('schedule.ok') + '</div>' +
      '<div class="summary-value" style="color:var(--success)">' + summary.ok + '</div>' +
    '</div>' +
    '<div class="summary-card">' +
      '<div class="summary-label">' + _t('schedule.error') + '</div>' +
      '<div class="summary-value" style="color:' + (summary.error > 0 ? 'var(--error)' : 'var(--text-2)') + '">' + summary.error + '</div>' +
    '</div>' +
    '<div class="summary-card">' +
      '<div class="summary-label">' + _t('schedule.next_run') + '</div>' +
      '<div class="summary-value" style="font-size:1.2rem">' + nextRunHtml + '</div>' +
    '</div>';
}

function renderHeartbeats(heartbeats) {
  const el = document.getElementById('heartbeats');
  if (!heartbeats.length) {
    el.innerHTML = '<div style="color:var(--text-3);padding:20px">' + _t('schedule.no_heartbeat') + '</div>';
    return;
  }
  let html = '';
  for (const hb of heartbeats) {
    html += '<div class="hb-card">';
    html += '<div class="hb-card-top">';
    html += '<span class="hb-icon">\u2661</span>';
    html += '<span class="hb-agent">' + escHtml(hb.agent_id) + '</span>';
    html += '<span class="hb-interval">' + _t('schedule.every') + ' ' + escHtml(hb.every) + '</span>';
    html += '</div>';

    html += '<div class="hb-meta">';
    if (hb.target) html += '<span class="hb-chip">' + escHtml(hb.target) + '</span>';
    if (hb.model) html += '<span class="hb-chip">' + escHtml(hb.model) + '</span>';
    html += '</div>';

    if (hb.active_hours) {
      html += '<div class="hb-card-body">';
      html += renderActiveHoursBar(hb.active_hours);
      html += '</div>';
    }

    if (hb.sessions && hb.sessions.length) {
      html += '<div class="hb-sessions">';
      for (const s of hb.sessions) {
        html += '<div class="hb-session-row">';
        html += '<span style="color:var(--text-2);min-width:120px">' + fmtDate(s.modified) + '</span>';
        html += '<span style="color:var(--text-1)">' + s.turns + ' ' + _t('schedule.turns') + '</span>';
        html += '<span style="color:var(--text-2)">' + fmtTokens(s.tokens) + '</span>';
        html += '<span style="color:var(--success)">' + fmtCost(s.cost) + '</span>';
        html += '<a href="/session/' + encodeURIComponent(s.session_id) + '" class="session-link">\u2192</a>';
        html += '</div>';
      }
      html += '</div>';
    } else {
      html += '<div style="color:var(--text-3);font-size:12px;padding:4px 0">' + _t('schedule.no_sessions') + '</div>';
    }

    html += '</div>';
  }
  el.innerHTML = html;
}

function renderCronJobs(jobs) {
  const el = document.getElementById('cron-jobs');
  if (!jobs.length) {
    el.innerHTML = '<div style="color:var(--text-3);padding:20px">' + _t('schedule.no_jobs') + '</div>';
    return;
  }
  let html = '';
  for (const job of jobs) {
    const disabledClass = job.enabled ? '' : ' disabled';
    const errorClass = (job.consecutive_errors > 0 && job.enabled) ? ' error-state' : '';
    html += '<div class="cron-card' + disabledClass + errorClass + '">';

    html += '<div class="cron-card-top">';
    html += '<div class="cron-card-identity">';
    html += statusDotHtml(job.last_status, job.enabled);
    html += '<span class="cron-card-name">' + escHtml(job.name) + '</span>';
    html += '<span class="badge badge-agent">' + escHtml(job.agent_id) + '</span>';
    if (job.consecutive_errors > 0) {
      html += '<span class="cron-error-badge">' + job.consecutive_errors + ' ' + _t('schedule.errors') + '</span>';
    }
    html += '</div>';
    html += '<span class="cron-expr-badge">' + escHtml(job.schedule_expr) + '</span>';
    html += '</div>';

    html += '<div class="cron-card-timing">';
    if (job.enabled && job.last_run_at_ms) {
      html += '<div class="cron-time-item"><span class="cron-time-label">' + _t('schedule.last') + '</span><span class="cron-time-value">' + fmtRelMs(job.last_run_at_ms);
      if (job.last_duration_ms) html += ' <span style="color:var(--text-3)">(' + fmtDuration(job.last_duration_ms) + ')</span>';
      html += '</span></div>';
    }
    if (job.enabled && job.next_run_at_ms) {
      html += '<div class="cron-time-item"><span class="cron-time-label">' + _t('schedule.next') + '</span><span class="cron-time-value">'
        + '<span x-data="schedCountdown(' + job.next_run_at_ms + ')" x-text="display"></span>'
        + '</span></div>';
    }
    if (job.timezone) {
      html += '<div class="cron-time-item"><span class="hb-chip">' + escHtml(job.timezone) + '</span></div>';
    }
    if (job.wake_mode) {
      html += '<div class="cron-time-item"><span class="hb-chip">wake: ' + escHtml(job.wake_mode) + '</span></div>';
    }
    html += '</div>';

    html += '<div class="cron-card-detail">';
    if (job.payload_message) {
      const payloadPreview = truncate(job.payload_message, 300);
      html += '<div class="cron-payload">' + escHtml(payloadPreview) + '</div>';
      html += makeShowFullBtn(_t('turns.show_full'), job.name + ' payload', job.payload_message, 300);
    }

    if (job.runs && job.runs.length) {
      const maxRuns = 5;
      const displayRuns = job.runs.slice(0, maxRuns);
      html += '<table class="cron-runs-table">';
      html += '<thead><tr><th>' + _t('schedule.col.time') + '</th><th>' + _t('schedule.col.status') + '</th><th>' + _t('schedule.col.duration') + '</th><th>' + _t('schedule.col.summary') + '</th><th></th></tr></thead>';
      html += '<tbody>';
      for (const run of displayRuns) {
        const statusColor = run.status === 'ok' ? 'var(--success)' : run.status === 'error' ? 'var(--error)' : 'var(--text-2)';
        html += '<tr>';
        html += '<td style="white-space:nowrap">' + fmtMs(run.ts) + '</td>';
        html += '<td><span style="color:' + statusColor + '">' + escHtml(run.status) + '</span></td>';
        html += '<td>' + fmtDuration(run.duration_ms) + '</td>';
        var summaryText = run.error || run.summary || '';
        var summaryTitle = run.error ? _t('schedule.col.status') : _t('schedule.col.summary');
        html += '<td>' +
          escHtml(truncate(summaryText, 80)) +
          makeShowFullBtn(_t('turns.show_full'), summaryTitle, summaryText, 80) +
          '</td>';
        html += '<td>';
        if (run.session_id) {
          html += '<a href="/session/' + encodeURIComponent(run.session_id) + '" class="session-link" title="Open session">\u2192</a>';
        }
        html += '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      if (job.runs.length > maxRuns) {
        html += '<div style="text-align:center;font-size:11px;color:var(--text-3);padding:6px 0">+' + (job.runs.length - maxRuns) + ' more</div>';
      }
    } else {
      html += '<div style="color:var(--text-3);font-size:12px;padding:8px 0">' + _t('schedule.no_runs') + '</div>';
    }

    html += '</div>';
    html += '</div>';
  }
  el.innerHTML = html;
}

document.addEventListener('alpine:init', () => {
  // Countdown component for next-run times
  Alpine.data('schedCountdown', (targetMs) => ({
    display: '',
    _interval: null,
    init() {
      this.tick();
      this._interval = setInterval(() => this.tick(), 1000);
    },
    destroy() {
      if (this._interval) clearInterval(this._interval);
    },
    tick() {
      this.display = fmtRelMs(targetMs);
    }
  }));

  // Main schedule page component
  Alpine.data('schedulePage', () => ({
    loading: false,
    loaded: false,
    autoRefreshOn: true,
    countdown: 30,
    _refreshInterval: null,
    _countdownInterval: null,

    async load() {
      this.loading = true;
      try {
        const data = await fetchJSON('/api/schedule');
        renderSummary(data.summary, data.cron_jobs);
        renderHeartbeats(data.heartbeats);
        renderCronJobs(data.cron_jobs);
        this.loaded = true;
      } catch (e) {
        console.error('Schedule load error:', e);
        document.getElementById('cron-jobs').innerHTML =
          '<div style="color:var(--error);padding:20px">' + _t('schedule.load_failed') + ' ' + escHtml(e.message) + '</div>';
      } finally {
        this.loading = false;
        this.countdown = 30;
      }
    },

    startAutoRefresh() {
      this._refreshInterval = setInterval(() => {
        if (this.autoRefreshOn) this.load();
      }, 30000);
      this._countdownInterval = setInterval(() => {
        if (this.autoRefreshOn && this.countdown > 0) this.countdown--;
      }, 1000);
    },

    toggleAutoRefresh() {
      if (!this.autoRefreshOn) {
        this.countdown = 30;
      }
    },

    destroy() {
      if (this._refreshInterval) clearInterval(this._refreshInterval);
      if (this._countdownInterval) clearInterval(this._countdownInterval);
    }
  }));
});
</script>
{% endblock %}
