{% extends "base.html" %}
{% set active = "sessions" %}
{% block title %}Sessions{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Sessions</h1>
  <div class="filters">
    <select id="filter-count" class="input-select">
      <option value="30">30</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
  </div>
</div>

<div class="filter-bars">
  <div class="filter-bar-row" id="type-chips">
    <button class="type-chip active" data-type="">All</button>
    <button class="type-chip" data-type="chat">💬 Chat</button>
    <button class="type-chip" data-type="cron">⏰ Cron</button>
    <button class="type-chip" data-type="heartbeat">💗 HB</button>
    <button class="type-chip" data-type="subagent">🤖 Sub</button>
  </div>
  <div class="filter-bar-row" id="agent-chips">
    <button class="agent-chip active" data-agent="all">All</button>
  </div>
</div>

<div id="sessions-list">
  <div class="loading">Loading...</div>
</div>

<div id="load-more-wrap" style="text-align:center;margin-top:16px;display:none">
  <button class="btn btn-outline" id="btn-load-more">더보기</button>
</div>
{% endblock %}

{% block scripts %}
<script>
let activeAgent = 'all';
let activeType  = '';
let currentLoadCount = 50;

// ── Color palettes ──────────────────────────────────────────────────────────
// 인덱스별 에이전트 팔레트 (채도 높은 400-level, 전 색상 스펙트럼 커버)
const AGENT_PALETTE = [
  '#f87171',  // 0 red
  '#fb923c',  // 1 orange
  '#facc15',  // 2 yellow
  '#4ade80',  // 3 green
  '#34d399',  // 4 emerald
  '#22d3ee',  // 5 cyan
  '#60a5fa',  // 6 blue
  '#818cf8',  // 7 indigo
  '#a78bfa',  // 8 violet
  '#e879f9',  // 9 fuchsia
  '#fb7185',  // 10 rose
  '#a3e635',  // 11 lime
  '#2dd4bf',  // 12 teal
  '#38bdf8',  // 13 sky
  '#f472b6',  // 14 pink
  '#c084fc',  // 15 purple
];
const agentColorMap = {};

function agentColor(agentId) {
  if (agentColorMap[agentId] !== undefined) return agentColorMap[agentId];
  const idx = Object.keys(agentColorMap).length;
  agentColorMap[agentId] = AGENT_PALETTE[idx % AGENT_PALETTE.length];
  return agentColorMap[agentId];
}

// 타입별 고정 색상
const TYPE_COLORS = {
  chat:      '#60a5fa',  // blue
  cron:      '#fbbf24',  // amber
  heartbeat: '#f472b6',  // pink
  subagent:  '#a78bfa',  // violet
};

// 모델 팔레트 — blue/indigo/violet/purple 계열 안에서만 순환
// 에이전트(무지개)와 달리 "차갑고 기술적인" 계열로 통일감
const MODEL_PALETTE = [
  '#60a5fa',  // 0 blue-400
  '#818cf8',  // 1 indigo-400
  '#a78bfa',  // 2 violet-400
  '#c084fc',  // 3 purple-400
  '#38bdf8',  // 4 sky-400
  '#6366f1',  // 5 indigo-500
  '#7c3aed',  // 6 violet-600 (더 진함)
  '#22d3ee',  // 7 cyan-400
  '#a5b4fc',  // 8 indigo-300 (더 연함)
  '#7dd3fc',  // 9 sky-300
];
const modelColorMap = {};

function typeColor(type) {
  return TYPE_COLORS[type] || '#94a3b8';
}

function modelColor(model) {
  if (!model) return null;
  // 모델명 정규화: claude-sonnet-4-6-20250... → sonnet-4-6
  const key = model.replace('claude-', '').replace(/-\d{8}$/, '').toLowerCase();
  if (modelColorMap[key] !== undefined) return modelColorMap[key];
  const idx = Object.keys(modelColorMap).length;
  modelColorMap[key] = MODEL_PALETTE[idx % MODEL_PALETTE.length];
  return modelColorMap[key];
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function fmtRelTime(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const now = new Date();
  const diffSec = Math.floor((now - d) / 1000);
  const diffMin = Math.floor(diffSec / 60);
  const diffHr  = Math.floor(diffMin / 60);
  const diffDay = Math.floor(diffHr / 24);
  if (diffSec < 60) return '방금';
  if (diffMin < 60) return `${diffMin}분 전`;
  if (diffHr < 24)  return `${diffHr}시간 전`;
  if (diffDay < 7)  return `${diffDay}일 전`;
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
}

function typeLabel(type) {
  const m = { chat: '💬Chat', cron: '⏰Cron', heartbeat: '💗HB', subagent: '🤖Sub' };
  return m[type] || type;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Sessions ─────────────────────────────────────────────────────────────────
async function loadSessions() {
  let url = `/api/sessions?agent=${activeAgent}&last=${currentLoadCount}`;
  if (activeType) url += `&type=${activeType}`;

  const data = await fetchJSONSafe(url, {sessions:[]});
  const list = qs('#sessions-list');

  if (!data || !data.length) {
    list.innerHTML = '<div class="empty">No sessions found</div>';
    qs('#load-more-wrap').style.display = 'none';
    return;
  }

  list.innerHTML = data.map(s => {
    const aColor  = agentColor(s.agent_id);
    const tColor  = typeColor(s.type);
    const relTime = fmtRelTime(s.modified || s.started_at);
    const msg     = s.last_message ? s.last_message.trim() : '';
    const modelShort = (s.model || '').replace('claude-', '').replace(/-\d{8}$/, '');
    const mColor  = modelColor(s.model);
    const sizeStr = fmtSize(s.file_size);
    const costStr = fmtCost(s.cost);

    const modelStyle = mColor
      ? `style="color:${mColor};border-color:${hexAlpha(mColor,0.25)};background:${hexAlpha(mColor,0.09)}"`
      : '';

    const toolChip = s.tool_calls > 0 ? `<span class="stat-chip tools">${s.tool_calls} tools</span>` : '';
    const subChip  = s.subagents > 0  ? `<span class="stat-chip subagents">${s.subagents} sub</span>` : '';
    const errChip  = s.errors > 0     ? `<span class="stat-chip errors">${s.errors} err</span>` : '';
    const avgChip  = s.avg_turn_time != null ? `<span class="stat-chip">~${s.avg_turn_time}s/턴</span>` : '';
    const avgTok   = s.turns > 0 ? Math.round(s.tokens / s.turns) : 0;
    const avgTokChip = avgTok > 0 ? `<span class="stat-chip tokens">${fmtTokens(avgTok)}/턴</span>` : '';

    return `
    <div class="session-card" data-type="${s.type}" onclick="location.href='/session/${s.session_id}'">
      <div class="sc-agent-panel" style="background:${hexAlpha(aColor,0.15)};color:${aColor}">
        <span>${s.agent_id}</span>
        <span class="sc-agent-time">${relTime}</span>
      </div>
      <div class="sc-body">
        <div class="sc-row1">
          <div class="sc-left">
            <code class="sc-sid">${s.session_id.slice(0,10)}</code>
            <span class="stat-chip model" ${modelStyle}>${modelShort || '—'}</span>
            <span class="stat-chip turns">${s.turns}턴</span>
            ${avgTokChip}
            ${toolChip}${subChip}${errChip}${avgChip}
          </div>
          <span class="sc-derived" style="color:var(--success);flex-shrink:0">${costStr}</span>
        </div>
        <div class="sc-row3">
          <span class="sc-type" style="color:${tColor}">[${typeLabel(s.type)}]</span>
          <span class="sc-msg">${msg ? escHtml(msg) : '<span class="sc-no-msg">메시지 없음</span>'}</span>
          <span class="sc-derived">${sizeStr}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  qs('#load-more-wrap').style.display = data.length >= currentLoadCount ? '' : 'none';
}

// ── Type chips ───────────────────────────────────────────────────────────────
function initTypeChips() {
  qsa('#type-chips .type-chip').forEach(btn => {
    const type  = btn.dataset.type;
    const color = TYPE_COLORS[type];
    btn.addEventListener('click', () => {
      qsa('#type-chips .type-chip').forEach(b => {
        b.classList.remove('active');
        b.style.cssText = '';
      });
      btn.classList.add('active');
      if (color) {
        btn.style.background   = hexAlpha(color, 0.12);
        btn.style.borderColor  = color;
        btn.style.color        = color;
      }
      activeType = type;
      currentLoadCount = parseInt(qs('#filter-count').value, 10);
      loadSessions();
    });
  });
}

// ── Agent chips ──────────────────────────────────────────────────────────────
async function loadAgents() {
  const agents = await fetchJSONSafe('/api/agents');

  // 색상 index 순서대로 미리 할당
  agents.forEach(a => agentColor(a.id));

  const bar = qs('#agent-chips');
  agents.forEach(a => {
    const btn   = document.createElement('button');
    btn.className   = 'agent-chip';
    btn.dataset.agent = a.id;
    const color = agentColor(a.id);
    btn.innerHTML = `<span class="ac-dot" style="background:${color}"></span>${escHtml(a.id)} <span class="ac-count">${a.sessions}</span>`;
    btn.addEventListener('click', () => {
      qs('#agent-chips .active')?.classList.remove('active');
      btn.classList.add('active');
      activeAgent = a.id;
      currentLoadCount = parseInt(qs('#filter-count').value, 10);
      loadSessions();
    });
    bar.appendChild(btn);
  });

  qs('[data-agent="all"]').addEventListener('click', function() {
    qs('#agent-chips .active')?.classList.remove('active');
    this.classList.add('active');
    activeAgent = 'all';
    currentLoadCount = parseInt(qs('#filter-count').value, 10);
    loadSessions();
  });

  qs('#agent-list').innerHTML = agents.map(a =>
    `<div class="agent-badge">${a.id} <span class="dim">${a.sessions}</span></div>`
  ).join('');
}

// ── Bootstrap ────────────────────────────────────────────────────────────────
qs('#btn-load-more').addEventListener('click', () => {
  currentLoadCount += parseInt(qs('#filter-count').value, 10);
  loadSessions();
});

qs('#filter-count').addEventListener('change', () => {
  currentLoadCount = parseInt(qs('#filter-count').value, 10);
  loadSessions();
});

initTypeChips();
loadAgents();
loadSessions();
</script>
{% endblock %}
