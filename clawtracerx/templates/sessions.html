{% extends "base.html" %}
{% set active = "sessions" %}
{% block title %}Sessions{% endblock %}

{% block content %}
<div x-data="sessionsPage()" x-init="init()">

<div class="page-header">
  <h1 data-i18n="sessions.title">Sessions</h1>
  <div class="filters">
    <select id="filter-count" class="input-select" x-model="loadCount" @change="reload()">
      <option value="30">30</option>
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
    <button class="btn btn-outline btn-sm" @click="exportCSV()" data-i18n="sessions.export_csv">Export CSV</button>
  </div>
</div>

<div x-show="loading" class="loading-bar"></div>

<div class="search-bar" style="margin-bottom:12px">
  <input type="text" class="input-search" id="session-search"
         :placeholder="_t('sessions.search_placeholder')"
         data-i18n-placeholder="sessions.search_placeholder"
         @input="debouncedFilterCards()">
</div>

<div class="filter-bars">
  <div class="filter-bar-row" id="type-chips">
    <button class="type-chip" :class="{ active: activeType === '' }" @click="setType('')" data-i18n="sessions.type.all">All</button>
    <button class="type-chip" :class="{ active: activeType === 'chat' }" @click="setType('chat')" data-i18n="sessions.type.chat">💬 Chat</button>
    <button class="type-chip" :class="{ active: activeType === 'cron' }" @click="setType('cron')" data-i18n="sessions.type.cron">⏰ Cron</button>
    <button class="type-chip" :class="{ active: activeType === 'heartbeat' }" @click="setType('heartbeat')" data-i18n="sessions.type.hb">💗 HB</button>
    <button class="type-chip" :class="{ active: activeType === 'subagent' }" @click="setType('subagent')" data-i18n="sessions.type.sub">🤖 Sub</button>
  </div>
  <div class="filter-bar-row" id="agent-chips">
    <button class="agent-chip" :class="{ active: activeAgent === 'all' }" @click="setAgent('all')" data-i18n="sessions.agent.all">All</button>
    <template x-for="a in agents" :key="a.id">
      <button class="agent-chip" :class="{ active: activeAgent === a.id }" @click="setAgent(a.id)">
        <span class="ac-dot" :style="'background:' + agentColor(a.id)"></span>
        <span x-text="a.id"></span> <span class="ac-count" x-text="a.sessions"></span>
      </button>
    </template>
  </div>
</div>

<div id="sessions-list">
  <div class="loading" x-show="!loaded" data-i18n="sessions.loading">Loading...</div>
</div>

<div id="load-more-wrap" style="text-align:center;margin-top:16px" x-show="hasMore">
  <button class="btn btn-outline" @click="loadMore()" data-i18n="sessions.load_more">Load More</button>
</div>

</div>
{% endblock %}

{% block scripts %}
<script>
/* Alpine sessionsPage is registered below; these globals are still needed for renderSessions */
let activeAgent = 'all';
let activeType  = '';
let currentLoadCount = 50;
let _sessionsData = [];  // raw data for search filtering & export

// ── Color palettes ──────────────────────────────────────────────────────────
// 인덱스별 에이전트 팔레트 (채도 높은 400-level, 전 색상 스펙트럼 커버)
const AGENT_PALETTE = [
  '#f87171',  // 0 red
  '#fb923c',  // 1 orange
  '#facc15',  // 2 yellow
  '#4ade80',  // 3 green
  '#34d399',  // 4 emerald
  '#22d3ee',  // 5 cyan
  '#60a5fa',  // 6 blue
  '#818cf8',  // 7 indigo
  '#a78bfa',  // 8 violet
  '#e879f9',  // 9 fuchsia
  '#fb7185',  // 10 rose
  '#a3e635',  // 11 lime
  '#2dd4bf',  // 12 teal
  '#38bdf8',  // 13 sky
  '#f472b6',  // 14 pink
  '#c084fc',  // 15 purple
];
const agentColorMap = {};

function agentColor(agentId) {
  if (agentColorMap[agentId] !== undefined) return agentColorMap[agentId];
  const idx = Object.keys(agentColorMap).length;
  agentColorMap[agentId] = AGENT_PALETTE[idx % AGENT_PALETTE.length];
  return agentColorMap[agentId];
}

// 타입별 고정 색상
const TYPE_COLORS = {
  chat:      '#60a5fa',  // blue
  cron:      '#fbbf24',  // amber
  heartbeat: '#f472b6',  // pink
  subagent:  '#a78bfa',  // violet
};

// 모델 팔레트 — blue/indigo/violet/purple 계열 안에서만 순환
// 에이전트(무지개)와 달리 "차갑고 기술적인" 계열로 통일감
const MODEL_PALETTE = [
  '#60a5fa',  // 0 blue-400
  '#818cf8',  // 1 indigo-400
  '#a78bfa',  // 2 violet-400
  '#c084fc',  // 3 purple-400
  '#38bdf8',  // 4 sky-400
  '#6366f1',  // 5 indigo-500
  '#7c3aed',  // 6 violet-600 (더 진함)
  '#22d3ee',  // 7 cyan-400
  '#a5b4fc',  // 8 indigo-300 (더 연함)
  '#7dd3fc',  // 9 sky-300
];
const modelColorMap = {};

function typeColor(type) {
  return TYPE_COLORS[type] || '#94a3b8';
}

function modelColor(model) {
  if (!model) return null;
  // 모델명 정규화: claude-sonnet-4-6-20250... → sonnet-4-6
  const key = model.replace('claude-', '').replace(/-\d{8}$/, '').toLowerCase();
  if (modelColorMap[key] !== undefined) return modelColorMap[key];
  const idx = Object.keys(modelColorMap).length;
  modelColorMap[key] = MODEL_PALETTE[idx % MODEL_PALETTE.length];
  return modelColorMap[key];
}

const CHANNEL_ICONS = {
  telegram:   '✈️',
  discord:    '🎮',
  whatsapp:   '📱',
  slack:      '📢',
  signal:     '🔒',
  imessage:   '🍎',
  irc:        '💻',
  googlechat: '💬',
};

function copyPath(path) {
  navigator.clipboard.writeText(path).catch(() => {});
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function fmtRelTime(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const now = new Date();
  const diffSec = Math.floor((now - d) / 1000);
  const diffMin = Math.floor(diffSec / 60);
  const diffHr  = Math.floor(diffMin / 60);
  const diffDay = Math.floor(diffHr / 24);
  if (diffSec < 60) return _t('time.just_now');
  if (diffMin < 60) return `${diffMin}${_t('time.minutes_ago')}`;
  if (diffHr < 24)  return `${diffHr}${_t('time.hours_ago')}`;
  if (diffDay < 7)  return `${diffDay}${_t('time.days_ago')}`;
  return d.toLocaleDateString(getLang() === 'en' ? 'en-US' : 'ko-KR', { month: 'short', day: 'numeric' });
}

function typeLabel(type) {
  const m = { chat: '💬Chat', cron: '⏰Cron', heartbeat: '💗HB', subagent: '🤖Sub' };
  return m[type] || type;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Sessions ─────────────────────────────────────────────────────────────────
async function loadSessions() {
  let url = `/api/sessions?agent=${activeAgent}&last=${currentLoadCount}`;
  if (activeType) url += `&type=${activeType}`;

  const data = await fetchJSONSafe(url, {sessions:[]});
  _sessionsData = data || [];
  const list = qs('#sessions-list');

  if (!data || !data.length) {
    list.innerHTML = '<div class="empty">' + _t('sessions.empty') + '</div>';
    qs('#load-more-wrap').style.display = 'none';
    return;
  }

  // Compute high-cost threshold (top 10%)
  const costs = data.map(s => s.cost || 0).filter(c => c > 0).sort((a, b) => b - a);
  const highCostThreshold = costs.length >= 3 ? costs[Math.floor(costs.length * 0.1)] : Infinity;

  list.innerHTML = data.map(s => {
    const aColor  = agentColor(s.agent_id);
    const tColor  = typeColor(s.type);
    const relTime = fmtRelTime(s.modified || s.started_at);
    const msg     = s.last_message ? s.last_message.trim() : '';
    const modelShort = (s.model || '').replace('claude-', '').replace(/-\d{8}$/, '');
    const mColor  = modelColor(s.model);
    const sizeStr = fmtSize(s.file_size);
    const costStr = fmtCost(s.cost);

    const modelStyle = mColor
      ? `style="color:${mColor};border-color:${hexAlpha(mColor,0.25)};background:${hexAlpha(mColor,0.09)}"`
      : '';

    const toolChip = s.tool_calls > 0 ? `<span class="stat-chip tools">${s.tool_calls} ${_t('sessions.tools')}</span>` : '';
    const subChip  = s.subagents > 0  ? `<span class="stat-chip subagents">${s.subagents} ${_t('sessions.sub')}</span>` : '';
    const errChip  = s.errors > 0     ? `<span class="stat-chip errors">${s.errors} ${_t('sessions.err')}</span>` : '';
    const avgChip  = s.avg_turn_time != null ? `<span class="stat-chip">~${s.avg_turn_time}${_t('sessions.s_per_turn')}</span>` : '';
    const avgTok   = s.turns > 0 ? Math.round(s.tokens / s.turns) : 0;
    const avgTokChip = avgTok > 0 ? `<span class="stat-chip tokens">${fmtTokens(avgTok)}${_t('sessions.per_turn')}</span>` : '';

    const chIcon  = s.channel ? (CHANNEL_ICONS[s.channel] || '📡') : '';
    const chBadge = s.channel
      ? `<span class="stat-chip channel" title="${escHtml(s.channel)}">${chIcon} ${escHtml(s.channel)}</span>`
      : '';
    const pathBtn = s.file_path
      ? `<button class="sc-path-btn" title="${escHtml(s.file_path)}" aria-label="Copy file path" onclick="event.stopPropagation();copyPath('${escHtml(s.file_path)}')">📋</button>`
      : '';
    const highCostBadge = (s.cost || 0) >= highCostThreshold && highCostThreshold < Infinity
      ? `<span class="stat-chip high-cost">${_t('sessions.high_cost')}</span>` : '';

    return `
    <div class="session-card" data-type="${s.type}" data-search="${escHtml((s.session_id + ' ' + s.agent_id + ' ' + (s.last_message || '') + ' ' + (s.model || '')).toLowerCase())}" onclick="location.href='/session/${s.session_id}'">
      <div class="sc-agent-panel" style="background:${hexAlpha(aColor,0.15)};color:${aColor}">
        <span>${s.agent_id}</span>
        <span class="sc-agent-time">${relTime}</span>
      </div>
      <div class="sc-body">
        <div class="sc-row1">
          <div class="sc-left">
            <code class="sc-sid">${s.session_id.slice(0,10)}</code>
            <span class="stat-chip model" ${modelStyle}>${modelShort || '—'}</span>
            <span class="stat-chip turns">${s.turns}${_t('sessions.turns')}</span>
            ${avgTokChip}
            ${toolChip}${subChip}${errChip}${avgChip}
            ${chBadge}${highCostBadge}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            ${pathBtn}
            <span class="sc-derived" style="color:var(--success)">${costStr}</span>
          </div>
        </div>
        <div class="sc-row3">
          <span class="sc-type" style="color:${tColor}">[${typeLabel(s.type)}]</span>
          <span class="sc-msg">${(() => {
            const isAI = s.last_message_role === 'assistant';
            if (msg) return isAI ? `<span class="sc-msg-ai">${escHtml(msg)}</span>` : escHtml(msg);
            return `<span class="sc-no-msg">${_t('sessions.no_message')}</span>`;
          })()}</span>
          <span class="sc-derived">${sizeStr}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  qs('#load-more-wrap').style.display = data.length >= currentLoadCount ? '' : 'none';
}

// ── Alpine sessionsPage ──────────────────────────────────────────────────────
document.addEventListener('alpine:init', () => {
  Alpine.data('sessionsPage', () => ({
    activeAgent: 'all',
    activeType: '',
    loadCount: '50',
    loading: false,
    loaded: false,
    hasMore: false,
    agents: [],

    debouncedFilterCards: null,

    async init() {
      // Apply URL query params (e.g., from cost chart drill-down)
      const params = new URLSearchParams(location.search);
      if (params.get('agent')) { this.activeAgent = params.get('agent'); activeAgent = this.activeAgent; }
      if (params.get('type')) { this.activeType = params.get('type'); activeType = this.activeType; }

      await this.loadAgents();
      await this.reload();
      document.addEventListener('langchange', () => this.reload());
      this.debouncedFilterCards = debounce(() => this.filterCards(), 300);

      // Keyboard shortcut: Ctrl+F for search
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'f') {
          e.preventDefault();
          qs('#session-search').focus();
        }
      });
    },

    setType(type) {
      this.activeType = type;
      activeType = type;
      this.reload();
    },

    setAgent(id) {
      this.activeAgent = id;
      activeAgent = id;
      this.reload();
    },

    async reload() {
      currentLoadCount = parseInt(this.loadCount, 10);
      activeAgent = this.activeAgent;
      activeType = this.activeType;
      this.loading = true;
      await loadSessions();
      this.loading = false;
      this.loaded = true;
      const list = qs('#sessions-list');
      this.hasMore = list && list.children.length >= currentLoadCount;
    },

    async loadMore() {
      currentLoadCount += parseInt(this.loadCount, 10);
      this.loading = true;
      await loadSessions();
      this.loading = false;
      const list = qs('#sessions-list');
      this.hasMore = list && list.children.length >= currentLoadCount;
    },

    filterCards() {
      const q = (qs('#session-search').value || '').toLowerCase().trim();
      const cards = qsa('.session-card');
      let visible = 0;
      cards.forEach(c => {
        const match = !q || (c.dataset.search || '').includes(q);
        c.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      // Show "no match" message
      let noMatch = qs('#no-match-msg');
      if (!visible && q) {
        if (!noMatch) {
          noMatch = document.createElement('div');
          noMatch.id = 'no-match-msg';
          noMatch.className = 'empty';
          qs('#sessions-list').appendChild(noMatch);
        }
        noMatch.textContent = _t('sessions.no_match');
        noMatch.style.display = '';
      } else if (noMatch) {
        noMatch.style.display = 'none';
      }
    },

    exportCSV() {
      if (!_sessionsData.length) return;
      const header = 'session_id,agent_id,type,model,turns,tokens,cost,started_at\n';
      const rows = _sessionsData.map(s =>
        [s.session_id, s.agent_id, s.type, s.model, s.turns, s.tokens, s.cost, s.started_at].map(v => '"' + String(v || '').replace(/"/g, '""') + '"').join(',')
      ).join('\n');
      const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'sessions.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    },

    async loadAgents() {
      const agents = await fetchJSONSafe('/api/agents');
      agents.forEach(a => agentColor(a.id));
      this.agents = agents;
      qs('#agent-list').innerHTML = agents.map(a =>
        `<div class="agent-badge">${a.id} <span class="dim">${a.sessions}</span></div>`
      ).join('');
    },
  }));
});
</script>
{% endblock %}
