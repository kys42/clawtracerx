{% extends "base.html" %}
{% set active = "sessions" %}
{% block title %}Session {{ session_id[:10] }}{% endblock %}

{% block content %}
<div x-data="detailPage()" x-init="init()" @langchange.window="onLangChange()">

<div class="page-header">
  <a href="/" class="back-link">&larr; <span data-i18n="detail.back">Sessions</span></a>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" id="expand-all-btn" onclick="expandAllTurns()" aria-label="Expand all turns" data-i18n="detail.expand_all">Expand All</button>
    <button class="btn btn-outline btn-sm" id="collapse-all-btn" onclick="collapseAllTurns()" aria-label="Collapse all turns" data-i18n="detail.collapse_all">Collapse All</button>
    <button class="btn btn-outline btn-sm" id="sort-btn" @click="toggleSort()"
            x-text="sortNewest ? _t('detail.sort_newest') : _t('detail.sort_oldest')">Newest first</button>
    <button class="btn btn-outline btn-sm" @click="exportJSON()" data-i18n="detail.export_json">Export JSON</button>
    <button class="btn btn-outline btn-sm" :class="{ 'btn-live-active': liveActive }" @click="toggleLive()" id="live-btn">
      <span class="live-dot" x-show="liveActive"></span>
      <span x-text="liveLabel">Live</span>
    </button>
    <a href="/session/{{ session_id }}/graph" class="btn btn-outline" id="graph-btn" data-i18n="detail.graph">Graph View</a>
  </div>
</div>

<div id="session-header" class="card session-header">
  <div class="loading" data-i18n="detail.loading" x-show="!loaded">Loading session...</div>
</div>

<div class="turn-filter-bar" x-show="loaded" style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
  <input type="text" class="input-search" id="turn-search"
         :placeholder="_t('detail.search_placeholder')"
         data-i18n-placeholder="detail.search_placeholder"
         @input="filterTurns()" style="flex:1;min-width:200px">
  <select class="input-select" id="tool-filter" @change="filterTurns()">
    <option value="" data-i18n="detail.filter_all_tools">All tools</option>
  </select>
  <span id="filter-match-count" style="color:var(--text-3);font-size:12px"></span>
  <button class="btn btn-outline btn-sm" @click="clearFilters()" data-i18n="detail.clear_filter">Clear</button>
</div>

<div id="turns-container"></div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/turns.js"></script>
<script>
const SESSION_ID = '{{ session_id }}';
let sessionData = null;
let sortOrder = 'newest'; // 'newest' | 'oldest'

function getSortedTurns(turns) {
  return sortOrder === 'newest' ? [...turns].reverse() : turns;
}

async function loadSession() {
  sessionData = await fetchJSONSafe(`/api/session/${SESSION_ID}`, {});
  renderHeader(sessionData);
  renderTurns(getSortedTurns(sessionData.turns), []);
}

document.addEventListener('alpine:init', () => {
  Alpine.data('detailPage', () => ({
    sortNewest: true,
    loaded: false,
    liveActive: false,
    liveLabel: 'Live',
    _evtSource: null,
    _reconnectCount: 0,

    async init() {
      await loadSession();
      this.loaded = true;
      this.populateToolFilter();
    },

    populateToolFilter() {
      if (!sessionData || !sessionData.turns) return;
      const tools = new Set();
      sessionData.turns.forEach(t => (t.tool_calls || []).forEach(tc => tools.add(tc.name)));
      const sel = qs('#tool-filter');
      const sorted = [...tools].sort();
      sorted.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
    },

    filterTurns() {
      const q = (qs('#turn-search').value || '').toLowerCase().trim();
      const toolName = qs('#tool-filter').value;
      const cards = qsa('#turns-container > .turn-card, #turns-container > .workflow-group');
      let visible = 0;
      cards.forEach(card => {
        const text = (card.textContent || '').toLowerCase();
        const matchText = !q || text.includes(q);
        const matchTool = !toolName || text.includes(toolName.toLowerCase());
        const show = matchText && matchTool;
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      const countEl = qs('#filter-match-count');
      if (q || toolName) {
        countEl.textContent = visible + _t('detail.matches');
      } else {
        countEl.textContent = '';
      }
    },

    clearFilters() {
      qs('#turn-search').value = '';
      qs('#tool-filter').value = '';
      qs('#filter-match-count').textContent = '';
      qsa('#turns-container > .turn-card, #turns-container > .workflow-group').forEach(c => c.style.display = '');
    },

    exportJSON() {
      if (!sessionData) return;
      const blob = new Blob([JSON.stringify(sessionData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = SESSION_ID.slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(a.href);
    },

    toggleLive() {
      if (this.liveActive) {
        this._closeLive();
      } else {
        this._startLive();
      }
    },

    _startLive() {
      const self = this;
      self.liveActive = true;
      self.liveLabel = 'Live';
      self._reconnectCount = 0;

      const es = new EventSource(`/api/session/${SESSION_ID}/stream`);
      self._evtSource = es;

      es.addEventListener('init', function() {
        // Already loaded — just confirm connection
      });

      es.addEventListener('update', function(e) {
        const data = JSON.parse(e.data);
        if (data.new_turns && data.new_turns.length && sessionData) {
          sessionData.turns.push(...data.new_turns);
          // Append new turn cards
          const container = qs('#turns-container');
          data.new_turns.forEach(function(t) {
            const div = document.createElement('div');
            div.innerHTML = renderSingleTurn(t);
            while (div.firstChild) container.appendChild(div.firstChild);
          });
          _autoScroll();
        }
      });

      es.addEventListener('patch', function(e) {
        const data = JSON.parse(e.data);
        if (data.turn && sessionData) {
          // Replace last turn in data
          const idx = sessionData.turns.findIndex(function(t) { return t.index === data.index; });
          if (idx >= 0) sessionData.turns[idx] = data.turn;
          // Re-render last turn card
          const cards = qsa('#turns-container > .turn-card');
          const lastCard = cards[cards.length - 1];
          if (lastCard) {
            const div = document.createElement('div');
            div.innerHTML = renderSingleTurn(data.turn);
            lastCard.replaceWith(div.firstElementChild || div);
          }
          _autoScroll();
        }
      });

      es.addEventListener('done', function() {
        self.liveLabel = 'Complete';
        self._closeLive();
      });

      es.addEventListener('error', function() {
        if (self._reconnectCount < 5) {
          self._reconnectCount++;
          // EventSource auto-reconnects
        } else {
          self._closeLive();
          self.liveLabel = 'Live';
        }
      });

      es.addEventListener('timeout', function() {
        self._closeLive();
        self.liveLabel = 'Live';
      });
    },

    _closeLive() {
      if (this._evtSource) {
        this._evtSource.close();
        this._evtSource = null;
      }
      this.liveActive = false;
    },

    toggleSort() {
      this.sortNewest = !this.sortNewest;
      sortOrder = this.sortNewest ? 'newest' : 'oldest';
      if (sessionData) {
        renderTurns(
          getSortedTurns(sessionData.turns),
          sortOrder === 'oldest' ? (sessionData.compaction_events || []) : []
        );
      }
    },

    onLangChange() {
      if (sessionData) {
        renderHeader(sessionData);
        renderTurns(
          getSortedTurns(sessionData.turns),
          sortOrder === 'oldest' ? (sessionData.compaction_events || []) : []
        );
      }
    }
  }));
});

function renderHeader(s) {
  const contextPanel = s.context ? renderContextPanel(s) : '';

  qs('#session-header').innerHTML = `
    <div class="session-meta">
      <h2>
        <code class="session-id">${s.session_id.slice(0,12)}</code>
        <span class="badge badge-agent">${s.agent_id}</span>
        <span class="badge badge-${s.session_type} badge-type">${s.session_type}</span>
      </h2>
      <div class="meta-grid">
        <div class="meta-item">
          <span class="meta-label">${_t('detail.started')}</span>
          <span class="meta-value">${fmtDate(s.started_at)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${_t('detail.model')}</span>
          <span class="meta-value model-name">${s.model}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${_t('detail.provider')}</span>
          <span class="meta-value">${s.provider}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${_t('detail.duration')}</span>
          <span class="meta-value">${fmtDuration(s.total_duration_ms)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${_t('detail.cost')}</span>
          <span class="meta-value cost">${fmtCost(s.total_cost)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${_t('detail.tokens')}</span>
          <span class="meta-value">${fmtTokens(s.total_tokens)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${_t('detail.turns')}</span>
          <span class="meta-value">${s.turns.length}</span>
        </div>
        ${s.context_tokens ? `<div class="meta-item">
          <span class="meta-label">${_t('detail.ctx_tokens')}</span>
          <span class="meta-value">${fmtTokens(s.context_tokens)}</span>
        </div>` : ''}
        ${s.compactions ? `<div class="meta-item">
          <span class="meta-label">${_t('detail.compactions')}</span>
          <span class="meta-value">${s.compactions}</span>
        </div>` : ''}
      </div>
      ${s.file_path ? `
      <div class="meta-file-path">
        <code title="${escHtml(s.file_path)}">${escHtml(s.file_path.replace(/^\/Users\/[^/]+/, '~'))}</code>
        <button class="btn-copy-path" onclick="navigator.clipboard.writeText('${escHtml(s.file_path)}').catch(function(){})" title="Copy path" aria-label="Copy file path">📋</button>
      </div>` : ''}
      ${contextPanel}
    </div>
  `;
}

function fmtK(n) {
  if (!n) return '—';
  if (n < 1e6) return (n / 1000).toFixed(2) + 'K';
  return (n / 1e6).toFixed(2) + 'M';
}

function renderContextPanel(s) {
  const ctx = s.context;
  const maxChars = ctx.bootstrapMaxChars || 1;
  const usedChars = ctx.systemPromptChars || 0;
  const usagePct = Math.round(usedChars / maxChars * 100);
  const pctClass = usagePct > 80 ? 'danger' : usagePct > 60 ? 'warning' : '';

  const filesHtml = ctx.injectedFiles.length ? `
    <div class="context-section">
      <div class="context-label">${_t('detail.injected_files')} (${ctx.injectedFiles.length})</div>
      <table class="ctx-table">
        <thead>
          <tr><th>${_t('detail.name')}</th><th>${_t('detail.injected')}</th><th></th></tr>
        </thead>
        <tbody>
          ${ctx.injectedFiles.map(f => {
            let injCell, badge;
            const rawTip = f.rawChars ? ` title="${fmtK(f.rawChars)} raw"` : '';
            if (f.missing) {
              injCell = `<span style="color:var(--error)">✕</span>`;
              badge = '';
            } else if (f.truncated) {
              injCell = `<span style="color:var(--warning)"${rawTip}>${fmtK(f.injectedChars)}</span>`;
              badge = `<span class="ctx-badge-trunc" title="truncated">✂</span>`;
            } else {
              injCell = `<span style="color:var(--success)"${rawTip}>${fmtK(f.injectedChars)}</span>`;
              badge = '';
            }
            const fp = f.path ? `data-filepath="${escHtml(f.path)}"` : '';
            return `<tr style="${f.missing ? 'opacity:0.45' : ''}">
              <td class="ctx-name ctx-file-link" ${fp} title="${escHtml(f.path || f.name)}">${escHtml(f.name)}</td>
              <td class="ctx-num">${injCell}</td>
              <td class="ctx-num ctx-badge-cell">${badge}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td class="ctx-name" style="color:var(--text-3)">${ctx.injectedFiles.length}${_t('detail.files_count')}</td>
            <td class="ctx-num" style="color:var(--success);font-weight:600">${fmtK(ctx.injectedFiles.reduce((a,f) => a+(f.injectedChars||0), 0))} ${_t('detail.total')}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>` : '';

  const skillsHtml = ctx.skills && ctx.skills.length ? `
    <div class="context-section">
      <div class="context-label">${_t('detail.skills')} (${ctx.skills.length})</div>
      <table class="ctx-table">
        <thead>
          <tr><th>${_t('detail.name')}</th><th>${_t('detail.chars')}</th></tr>
        </thead>
        <tbody>
          ${ctx.skills.map(sk => `<tr>
            <td class="ctx-name ctx-skill-link" data-skillname="${escHtml(sk.name)}" title="${escHtml(sk.name)}">${escHtml(sk.name)}</td>
            <td class="ctx-num" style="color:var(--accent)">${fmtK(sk.chars)}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td class="ctx-name" style="color:var(--text-3)">${_t('detail.total')}</td>
            <td class="ctx-num" style="color:var(--accent);font-weight:700">${fmtK(ctx.skills.reduce((a,s) => a+(s.chars||0), 0))}</td>
          </tr>
        </tfoot>
      </table>
    </div>` : '';

  const toolsHtml = ctx.tools && ctx.tools.length ? `
    <div class="context-section">
      <div class="context-label">${_t('detail.tools')} (${ctx.tools.length})</div>
      <table class="ctx-table">
        <thead>
          <tr>
            <th>${_t('detail.name')}</th>
            <th><span style="color:var(--warning)">●</span> ${_t('detail.desc')}</th>
            <th><span style="color:rgba(251,191,36,0.6)">●</span> ${_t('detail.schema')}</th>
            <th>${_t('detail.total')}</th>
          </tr>
        </thead>
        <tbody>
          ${ctx.tools.map(t => {
            const total = (t.summaryChars||0) + (t.schemaChars||0);
            return `<tr>
              <td class="ctx-name ctx-tool-link" data-toolname="${escHtml(t.name)}" title="${escHtml(t.name)}">${escHtml(t.name)}</td>
              <td class="ctx-num" style="color:var(--warning)">${fmtK(t.summaryChars)}</td>
              <td class="ctx-num" style="color:rgba(251,191,36,0.6)">${fmtK(t.schemaChars)}</td>
              <td class="ctx-num" style="color:var(--text-0);font-weight:600">${fmtK(total)}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td class="ctx-name" style="color:var(--text-3)">${_t('detail.total')}</td>
            <td class="ctx-num" style="color:var(--warning);font-weight:700">${fmtK(ctx.tools.reduce((a,t) => a+(t.summaryChars||0), 0))}</td>
            <td class="ctx-num" style="color:rgba(251,191,36,0.6);font-weight:700">${fmtK(ctx.tools.reduce((a,t) => a+(t.schemaChars||0), 0))}</td>
            <td class="ctx-num" style="color:var(--text-0);font-weight:700">${fmtK(ctx.tools.reduce((a,t) => a+(t.summaryChars||0)+(t.schemaChars||0), 0))}</td>
          </tr>
        </tfoot>
      </table>
    </div>` : '';

  const projPct = Math.round((ctx.projectContextChars || 0) / maxChars * 100);
  const sysPct  = Math.round((ctx.nonProjectContextChars || 0) / maxChars * 100);

  return `
  <div class="context-panel" x-data="{ ctxOpen: false }">
    <div class="context-panel-summary" @click="ctxOpen = !ctxOpen" style="cursor:pointer">
      <div class="context-summary-left">
        <span class="context-title">${_t('detail.context_injection')}</span>
        ${ctx.workspaceDir ? `<code style="font-size:10px;color:var(--text-3);font-family:'JetBrains Mono',monospace">${ctx.workspaceDir.replace(/^\/Users\/\w+/, '~')}</code>` : ''}
      </div>
      <div class="context-meta">
        <span>${fmtChars(usedChars)} / ${fmtChars(maxChars)}</span>
        <span class="context-pct ${pctClass}">${usagePct}%</span>
        <span class="context-chevron" :style="ctxOpen ? 'transform:rotate(180deg)' : ''">▾</span>
      </div>
    </div>
    <div class="context-body" x-show="ctxOpen" x-transition.duration.200ms>
      <div class="context-section">
        <div class="context-label">${_t('detail.system_prompt')}</div>
        <div class="ctx-usage-bar">
          <div class="ctx-usage-seg project" style="width:${projPct}%" title="${_t('detail.project')}: ${fmtChars(ctx.projectContextChars)}"></div>
          <div class="ctx-usage-seg system"  style="width:${sysPct}%"  title="${_t('detail.system')}: ${fmtChars(ctx.nonProjectContextChars)}"></div>
        </div>
        <div class="ctx-legend-row">
          <span><span class="ctx-dot project"></span>${_t('detail.project')} ${fmtChars(ctx.projectContextChars)}</span>
          <span><span class="ctx-dot system"></span>${_t('detail.system')} ${fmtChars(ctx.nonProjectContextChars)}</span>
        </div>
      </div>
      ${filesHtml}
      ${skillsHtml}
      ${toolsHtml}
    </div>
  </div>`;
}

function showRaw(turnIndex) {
  showTextModal(`Turn ${turnIndex} — Raw JSONL`,
    fetchJSON(`/api/session/${SESSION_ID}/raw/${turnIndex}`).then(d => JSON.stringify(d, null, 2)),
    { markdown: false }
  );
}

// Context panel click handlers (file / skill preview)
document.addEventListener('click', e => {
  const fileCell = e.target.closest('.ctx-file-link');
  if (fileCell && fileCell.dataset.filepath) {
    openRawModal(fileCell.textContent.trim(), fetchJSON(`/api/file-content?path=${encodeURIComponent(fileCell.dataset.filepath)}`));
    return;
  }
  const skillCell = e.target.closest('.ctx-skill-link');
  if (skillCell && skillCell.dataset.skillname) {
    openRawModal(skillCell.dataset.skillname + ' (SKILL.md)', fetchJSON(`/api/skill-content?name=${encodeURIComponent(skillCell.dataset.skillname)}`));
    return;
  }
  const toolCell = e.target.closest('.ctx-tool-link');
  if (toolCell && toolCell.dataset.toolname) {
    openRawModal(
      toolCell.dataset.toolname + ' (description)',
      fetchJSON(`/api/tool-content?name=${encodeURIComponent(toolCell.dataset.toolname)}`).then(d => ({content: d.description}))
    );
  }
});

function openRawModal(title, fetchPromise) {
  showTextModal(title, fetchPromise.then(d => d.content != null ? d.content : JSON.stringify(d, null, 2)), { markdown: false });
}

function openFullContent(tcId, field) {
  const title = field === 'result' ? `Tool result` : `Arg: ${field}`;
  openRawModal(title, fetchJSON(`/api/session/${SESSION_ID}/tc/${encodeURIComponent(tcId)}/full`).then(d => {
    if (field === 'result') return { content: d.result_text };
    return { content: typeof d.arguments[field] === 'string' ? d.arguments[field] : JSON.stringify(d.arguments[field], null, 2) };
  }));
}

function openFullUserText(turnIdx) {
  openRawModal(`Turn ${turnIdx} — user`, fetchJSON(`/api/session/${SESSION_ID}/turn/${turnIdx}/user-text`));
}

function expandAllTurns() {
  qsa('.turn-body.collapsed').forEach(el => el.classList.remove('collapsed'));
  qsa('.workflow-body.collapsed').forEach(el => el.classList.remove('collapsed'));
  qsa('.subagent-body.collapsed').forEach(el => el.classList.remove('collapsed'));
}

function collapseAllTurns() {
  qsa('.turn-body:not(.collapsed)').forEach(el => el.classList.add('collapsed'));
  qsa('.workflow-body:not(.collapsed)').forEach(el => el.classList.add('collapsed'));
  qsa('.subagent-body:not(.collapsed)').forEach(el => el.classList.add('collapsed'));
}

/* Render a single turn card for live append */
function renderSingleTurn(t) {
  return renderTurn(t, 0);
}

/* Auto-scroll if user is near bottom */
function _autoScroll() {
  const el = document.scrollingElement || document.documentElement;
  if (el.scrollHeight - el.scrollTop - el.clientHeight < 150) {
    window.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
  }
}

/* loadSession is called from Alpine init */
</script>
{% endblock %}
