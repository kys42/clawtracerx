{% extends "base.html" %}
{% set active = "sessions" %}
{% block title %}Graph — {{ session_id[:10] }}{% endblock %}

{% block content %}
<div class="page-header">
  <a href="/session/{{ session_id }}" class="back-link">&larr; Session Detail</a>
  <h1>Execution Graph</h1>
</div>

<div class="graph-controls">
  <button class="btn btn-outline" onclick="resetView()">Reset View</button>
  <button class="btn btn-outline" onclick="toggleLayout()">Toggle Layout</button>
  <div class="graph-legend">
    <span class="legend-node session-node"></span> Session
    <span class="legend-node turn-node"></span> Turn
    <span class="legend-node tool-node"></span> Tool
    <span class="legend-node subagent-node"></span> Subagent
  </div>
</div>

<div id="graph-container" class="graph-container">
  <canvas id="graph-canvas"></canvas>
</div>

<div id="node-panel" class="node-panel" style="display:none">
  <div class="node-panel-header">
    <h3 id="panel-title"></h3>
    <button class="btn-close" onclick="closePanel()">&times;</button>
  </div>
  <div id="panel-body"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const SESSION_ID = '{{ session_id }}';
let graphData = null;
let canvas, ctx;
let nodes = [], edges = [];
let nodeMap = {};
let viewX = 0, viewY = 0, viewScale = 1;
let dragging = false, dragNode = null, dragStartX, dragStartY;
let selectedNode = null;
let layoutMode = 'tree'; // 'tree' or 'force'
let animFrame = null;

const COLORS = {
  session:  { bg: '#6366f1', border: '#818cf8', text: '#fff' },
  turn:     { bg: '#0ea5e9', border: '#38bdf8', text: '#fff' },
  tool:     { bg: '#22c55e', border: '#4ade80', text: '#fff' },
  subagent: { bg: '#f59e0b', border: '#fbbf24', text: '#000' },
};
const STATUS_COLORS = { ok: '#22c55e', error: '#ef4444', unknown: '#6b7280' };

const NODE_SIZES = { session: 40, turn: 30, tool: 18, subagent: 32 };

async function init() {
  canvas = qs('#graph-canvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('dblclick', onDblClick);

  graphData = await fetchJSON(`/api/session/${SESSION_ID}/graph`);
  nodes = graphData.nodes.map((n, i) => ({
    ...n, x: 0, y: 0, vx: 0, vy: 0, radius: NODE_SIZES[n.type] || 20,
  }));
  edges = graphData.edges;

  nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  layoutTree();
  centerView();
  render();
}

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  if (nodes.length) render();
}

function layoutTree() {
  layoutMode = 'tree';
  // BFS from root, assign x/y in tree layout
  const root = nodes.find(n => n.type === 'session');
  if (!root) return;

  const children = {};
  edges.forEach(e => {
    if (!children[e.from]) children[e.from] = [];
    children[e.from].push(e.to);
  });

  const levels = {};
  const queue = [{ id: root.id, level: 0 }];
  const visited = new Set();
  visited.add(root.id);

  while (queue.length) {
    const { id, level } = queue.shift();
    if (!levels[level]) levels[level] = [];
    levels[level].push(id);

    (children[id] || []).forEach(childId => {
      if (!visited.has(childId)) {
        visited.add(childId);
        queue.push({ id: childId, level: level + 1 });
      }
    });
  }

  const levelGap = 120;
  Object.entries(levels).forEach(([level, ids]) => {
    const y = parseInt(level) * levelGap;
    const totalWidth = ids.length * 100;
    ids.forEach((id, i) => {
      const node = nodeMap[id];
      if (node) {
        node.x = (i - ids.length / 2) * 100 + 50;
        node.y = y;
      }
    });
  });
}

function layoutForce() {
  layoutMode = 'force';
  // Simple force simulation
  let iterations = 100;
  const repulsion = 5000;
  const attraction = 0.01;
  const damping = 0.9;

  for (let iter = 0; iter < iterations; iter++) {
    // Repulsion between all nodes
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const force = repulsion / (dist * dist);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        nodes[i].vx -= fx; nodes[i].vy -= fy;
        nodes[j].vx += fx; nodes[j].vy += fy;
      }
    }
    // Attraction along edges
    edges.forEach(e => {
      const from = nodeMap[e.from];
      const to = nodeMap[e.to];
      if (!from || !to) return;
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const force = attraction;
      from.vx += dx * force; from.vy += dy * force;
      to.vx -= dx * force; to.vy -= dy * force;
    });
    // Apply velocity
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      n.vx *= damping; n.vy *= damping;
    });
  }
  centerView();
  render();
}

function centerView() {
  if (!nodes.length) return;
  const minX = Math.min(...nodes.map(n => n.x));
  const maxX = Math.max(...nodes.map(n => n.x));
  const minY = Math.min(...nodes.map(n => n.y));
  const maxY = Math.max(...nodes.map(n => n.y));
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  viewX = w / 2 - cx;
  viewY = h / 2 - cy + 30;
  const span = Math.max(maxX - minX + 200, maxY - minY + 200, 1);
  viewScale = Math.min(w / span, h / span, 1.5);
}

function render() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  ctx.translate(viewX, viewY);
  ctx.scale(viewScale, viewScale);

  // Edges
  edges.forEach(e => {
    const from = nodeMap[e.from];
    const to = nodeMap[e.to];
    if (!from || !to) return;

    ctx.beginPath();
    ctx.moveTo(from.x, from.y);

    // Curved edge
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2;
    ctx.lineTo(to.x, to.y);

    ctx.strokeStyle = e.type === 'spawns' ? '#f59e0b80' : '#4b556380';
    ctx.lineWidth = e.type === 'spawns' ? 2 : 1;
    ctx.stroke();

    // Arrow head
    const angle = Math.atan2(to.y - from.y, to.x - from.x);
    const arrowSize = 6;
    const ax = to.x - Math.cos(angle) * to.radius;
    const ay = to.y - Math.sin(angle) * to.radius;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - arrowSize * Math.cos(angle - 0.4), ay - arrowSize * Math.sin(angle - 0.4));
    ctx.lineTo(ax - arrowSize * Math.cos(angle + 0.4), ay - arrowSize * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = e.type === 'spawns' ? '#f59e0b' : '#4b5563';
    ctx.fill();
  });

  // Nodes
  nodes.forEach(n => {
    const colors = COLORS[n.type] || COLORS.tool;
    const isSelected = selectedNode && selectedNode.id === n.id;

    // Glow for selected
    if (isSelected) {
      ctx.shadowColor = colors.border;
      ctx.shadowBlur = 15;
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.fillStyle = colors.bg;
    ctx.fill();
    ctx.strokeStyle = isSelected ? '#fff' : colors.border;
    ctx.lineWidth = isSelected ? 3 : 1.5;
    ctx.stroke();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Status indicator
    if (n.status && n.status !== 'ok') {
      ctx.beginPath();
      ctx.arc(n.x + n.radius * 0.7, n.y - n.radius * 0.7, 5, 0, Math.PI * 2);
      ctx.fillStyle = STATUS_COLORS[n.status] || STATUS_COLORS.unknown;
      ctx.fill();
    }

    // Label
    ctx.fillStyle = '#e2e8f0';
    ctx.font = `${n.type === 'tool' ? 9 : 11}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(truncate(n.label, 20), n.x, n.y + n.radius + 4);

    if (n.sublabel && n.type !== 'tool') {
      ctx.fillStyle = '#94a3b8';
      ctx.font = '9px -apple-system, system-ui, sans-serif';
      ctx.fillText(truncate(n.sublabel, 25), n.x, n.y + n.radius + 17);
    }
  });

  ctx.restore();
}

// --- Interaction ---
function screenToWorld(sx, sy) {
  return { x: (sx - viewX) / viewScale, y: (sy - viewY) / viewScale };
}

function hitTest(wx, wy) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = wx - n.x, dy = wy - n.y;
    if (dx * dx + dy * dy <= n.radius * n.radius * 1.5) return n;
  }
  return null;
}

function onMouseDown(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const { x, y } = screenToWorld(sx, sy);
  const hit = hitTest(x, y);

  if (hit) {
    dragNode = hit;
    dragStartX = x - hit.x;
    dragStartY = y - hit.y;
    selectedNode = hit;
    showPanel(hit);
  } else {
    dragging = true;
    dragStartX = sx - viewX;
    dragStartY = sy - viewY;
    selectedNode = null;
    closePanel();
  }
  render();
}

function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  if (dragNode) {
    const { x, y } = screenToWorld(sx, sy);
    dragNode.x = x - dragStartX;
    dragNode.y = y - dragStartY;
    render();
  } else if (dragging) {
    viewX = sx - dragStartX;
    viewY = sy - dragStartY;
    render();
  } else {
    const { x, y } = screenToWorld(sx, sy);
    const hit = hitTest(x, y);
    canvas.style.cursor = hit ? 'pointer' : 'grab';
  }
}

function onMouseUp() {
  dragNode = null;
  dragging = false;
}

function onWheel(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.1, Math.min(5, viewScale * delta));

  viewX = sx - (sx - viewX) * (newScale / viewScale);
  viewY = sy - (sy - viewY) * (newScale / viewScale);
  viewScale = newScale;
  render();
}

function onDblClick(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const { x, y } = screenToWorld(sx, sy);
  const hit = hitTest(x, y);
  if (hit && hit.child_session_id) {
    location.href = `/session/${hit.child_session_id}`;
  }
}

// --- Panel ---
function showPanel(node) {
  const panel = qs('#node-panel');
  qs('#panel-title').textContent = `${node.type}: ${node.label}`;

  let html = '<div class="panel-grid">';
  const items = [
    ['Type', node.type],
    ['Status', node.status || node.outcome || '—'],
    ['Model', node.model || '—'],
    ['Duration', node.duration_ms ? fmtDuration(node.duration_ms) : '—'],
    ['Cost', node.cost != null ? fmtCost(node.cost) : '—'],
    ['Tokens', node.tokens != null ? fmtTokens(node.tokens) : '—'],
    ['Turns', node.turns != null ? node.turns : '—'],
    ['Tools', node.tools != null ? node.tools : '—'],
  ];
  items.forEach(([k, v]) => {
    if (v && v !== '—') html += `<div class="panel-item"><span class="panel-label">${k}</span><span class="panel-value">${v}</span></div>`;
  });
  html += '</div>';

  if (node.sublabel) html += `<div class="panel-desc">${escHtml(node.sublabel)}</div>`;
  if (node.child_session_id) html += `<a href="/session/${node.child_session_id}" class="btn btn-primary btn-sm" style="margin-top:8px">Open Child Session</a>`;

  qs('#panel-body').innerHTML = html;
  panel.style.display = 'block';
}

function closePanel() {
  qs('#node-panel').style.display = 'none';
}

function resetView() {
  if (layoutMode === 'tree') layoutTree();
  centerView();
  render();
}

function toggleLayout() {
  if (layoutMode === 'tree') layoutForce();
  else { layoutTree(); centerView(); render(); }
}

init();
</script>
{% endblock %}
